<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>航班排班表</title>
<!-- 优先加载本地 SheetJS（自包含，不依赖外网 CDN）；若本地缺失则回退 CDN -->
<script src="libs/xlsx.full.min.js"></script>
<script>
  if (typeof XLSX === 'undefined') {
    document.write('<script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"><\/script>');
  }
</script>
<style>
  /* ============ Design Tokens（与所有页面统一）============ */
  :root {
    --brand:        #2563eb;
    --brand-dark:   #1d4ed8;
    --brand-deep:   #1e3a8a;
    --brand-light:  #eff6ff;
    --brand-soft:   #dbeafe;
    --ink:          #0f172a;
    --ink-2:        #334155;
    --muted:        #64748b;
    --muted-2:      #94a3b8;
    --line:         #e2e8f0;
    --bg:           #f1f5f9;
    --card:         #ffffff;
    --success:      #059669;
    --success-dark: #047857;
    --amber:        #d97706;
    --radius:       16px;
    --radius-sm:    10px;
    --shadow-sm:    0 1px 2px rgba(15,23,42,0.06), 0 1px 3px rgba(15,23,42,0.04);
    --shadow:       0 4px 6px -1px rgba(15,23,42,0.07), 0 2px 4px -2px rgba(15,23,42,0.05);
    --shadow-lg:    0 20px 25px -5px rgba(15,23,42,0.10), 0 8px 10px -6px rgba(15,23,42,0.06);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
    color: var(--ink-2); line-height: 1.6; min-height: 100vh;
    background:
      radial-gradient(1200px 600px at 100% -10%, #e0ecff 0%, rgba(224,236,255,0) 55%),
      radial-gradient(900px 500px at -10% 0%, #eef2ff 0%, rgba(238,242,255,0) 50%),
      var(--bg);
  }
  .container { max-width: 1440px; margin: 0 auto; padding: 28px 24px 48px; }

  /* Animations */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes floaty { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
  .anim { animation: fadeUp 0.45s cubic-bezier(0.22,1,0.36,1) both; }

  /* ============ Header ============ */
  .header {
    position: relative; overflow: hidden;
    background: linear-gradient(130deg, #1e3a8a 0%, #2563eb 55%, #3b82f6 100%);
    color: #fff; padding: 40px 40px; border-radius: 22px; margin-bottom: 28px;
    display: flex; align-items: center; justify-content: space-between; gap: 24px;
    box-shadow: 0 18px 40px -12px rgba(37,99,235,0.45);
  }
  .header::before {
    content: ""; position: absolute; top: -60px; right: -30px;
    width: 260px; height: 260px; border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.28), rgba(255,255,255,0) 70%);
  }
  .header::after {
    content: ""; position: absolute; bottom: -80px; left: 20%;
    width: 220px; height: 220px; border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.12), rgba(255,255,255,0) 70%);
  }
  .header .header-main { position: relative; z-index: 1; }
  .header .eyebrow {
    display: inline-flex; align-items: center; gap: 7px;
    font-size: 12px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase;
    background: rgba(255,255,255,0.16); padding: 5px 12px; border-radius: 20px;
    backdrop-filter: blur(6px); margin-bottom: 14px;
  }
  .header h1 { font-size: 30px; font-weight: 700; letter-spacing: -0.5px; line-height: 1.2; }
  .header p { font-size: 14.5px; opacity: 0.9; margin-top: 8px; max-width: 640px; }
  .header .plane {
    position: relative; z-index: 1; font-size: 60px; line-height: 1;
    animation: floaty 4s ease-in-out infinite; flex-shrink: 0;
    filter: drop-shadow(0 8px 14px rgba(0,0,0,0.2));
  }

  /* ============ Upload Zone ============ */
  .upload-zone {
    position: relative; background: var(--card);
    border: 2px dashed #cbd5e1; border-radius: var(--radius);
    padding: 48px 20px; text-align: center; cursor: pointer;
    transition: all 0.25s; margin-bottom: 28px; box-shadow: var(--shadow-sm);
  }
  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--brand); background: var(--brand-light);
    box-shadow: var(--shadow); transform: translateY(-1px);
  }
  .upload-zone .icon {
    width: 72px; height: 72px; margin: 0 auto 16px; border-radius: 20px;
    background: linear-gradient(135deg, var(--brand), var(--brand-deep));
    display: flex; align-items: center; justify-content: center;
    font-size: 34px; color: #fff; box-shadow: 0 10px 24px -8px rgba(37,99,235,0.7);
    transition: transform 0.25s;
  }
  .upload-zone:hover .icon { transform: scale(1.06) rotate(-3deg); }
  .upload-zone .text { font-size: 17px; color: var(--ink); font-weight: 600; }
  .upload-zone .hint { font-size: 13px; color: var(--muted-2); margin-top: 8px; }
  .upload-zone input[type="file"] { display: none; }

  /* ============ Panel ============ */
  .panel {
    background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
    box-shadow: var(--shadow-sm); padding: 20px 22px; margin-bottom: 24px;
  }
  .panel h2 { font-size: 16px; font-weight: 700; color: var(--ink); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }

  /* ============ Schedule Table（排班表核心）============ */
  .table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid var(--line); }
  table.sch-table { width: 100%; border-collapse: collapse; font-size: 13.5px; min-width: 1250px; }
  table.sch-table th {
    background: var(--brand-deep); color: #fff; font-weight: 600; padding: 11px 12px;
    text-align: center; white-space: nowrap; position: sticky; top: 0; z-index: 2;
  }
  table.sch-table td {
    border: 1px solid var(--line); padding: 11px 12px; text-align: center; vertical-align: middle;
    white-space: nowrap; font-size: 14px; line-height: 1.5;
  }
  table.sch-table tr:nth-child(even){ background: #fafbfc; }
  table.sch-table tr:hover{ background: var(--brand-light); }
  table.sch-table td.flight-num { font-weight: 700; color: var(--ink); font-size: 15px; }
  table.sch-table td.note-cell { font-size: 12.5px; line-height: 1.6; text-align: left; white-space: normal; max-width: 240px; }

  /* 可编辑单元格（插入行用） */
  table.sch-table input.cell-input {
    width: 100%; min-width: 60px; padding: 5px 8px; border: 1px solid #cbd5e1; border-radius: 7px;
    font-size: 13px; text-align: center; outline: none; transition: border .15s; background: #fff;
  }
  table.sch-table input.cell-input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(37,99,235,.15); }
  table.sch-table input.cell-input.note-input { text-align: left; }

  /* 操作列 */
  table.sch-table td.op-cell { white-space: nowrap; }
  .row-btn {
    display: inline-flex; align-items: center; gap: 3px; margin: 1px;
    padding: 4px 9px; border: 1px solid var(--line); border-radius: 7px;
    font-size: 11.5px; font-weight: 600; cursor: pointer; transition: all .15s; background: #fff; color: var(--ink-2);
  }
  .row-btn:hover { border-color: var(--brand); color: var(--brand); background: var(--brand-light); }
  .row-btn.danger:hover { border-color: #dc2626; color: #dc2626; background: #fef2f2; }

  /* 登机口输入 */
  table.sch-table input.gate-input {
    width: 64px; padding: 5px 8px; border: 1px solid #cbd5e1; border-radius: 7px;
    font-size: 14px; text-align: center; outline: none; transition: border .15s;
  }
  table.sch-table input.gate-input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(37,99,235,.15); }

  /* 负责人标签 */
  .resp-cell { display: flex; justify-content: center; align-items: center; gap: 4px; flex-wrap: wrap; }
  .resp-tag {
    display: inline-flex; align-items: center; gap: 3px;
    padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 600;
    cursor: default; user-select: none; line-height: 1.35; border: 1px solid transparent;
  }
  .resp-tag .rm-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 14px; height: 14px; border-radius: 50%; font-size: 10px; line-height: 1;
    color: inherit; opacity: 0.6; cursor: pointer; transition: opacity .15s;
  }
  .resp-tag .rm-btn:hover{ opacity: 1; }
  .tag-blue   { background: #dbeafe; color: #1d4ed8; border-color: #bfdbfe; }
  .tag-pink   { background: #fce7f3; color: #be185d; border-color: #fbcfe8; }
  .tag-green  { background: #d1fae5; color: #047857; border-color: #a7f3d0; }
  .tag-sky    { background: #e0f2fe; color: #0369a1; border-color: #bae6fd; }
  .tag-amber  { background: #fef3c7; color: #b45309; border-color: #fde68a; }
  .tag-purple { background: #ede9fe; color: #6d28d9; border-color: #ddd6fe; }

  /* 负责人下拉选择器 */
  .picker-wrap { position: relative; display: inline-block; }
  .picker-trigger {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 12px; border: 1px dashed #94a3b8; border-radius: 8px;
    font-size: 12px; color: var(--muted-2); cursor: pointer; transition: all .15s;
    background: transparent; user-select: none;
  }
  .picker-trigger:hover{ border-color: var(--brand); color: var(--brand); }
  .picker-trigger.mini{ padding: 3px 11px; font-size: 16px; line-height: 1; border-radius: 50%;
                        border-style: solid; color: var(--brand); border-color: var(--brand-soft); background: #fff; }
  .picker-trigger.mini:hover{ background: var(--brand-light); }
  .picker-menu {
    display: none; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
    background: var(--card); border: 1px solid var(--line); border-radius: 12px;
    box-shadow: var(--shadow-lg); padding: 12px; z-index: 100; width: 260px; margin-top: 4px;
  }
  .picker-menu.open{ display: block; animation: fadeUp .2s ease both; }
  .picker-row{
    display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 8px; cursor: pointer; transition: background .15s;
  }
  .picker-row:hover{ background: var(--brand-light); }
  .picker-row input[type="checkbox"]{ accent-color: var(--brand); width: 15px; height: 15px; flex-shrink: 0; }
  .picker-row label{ font-size: 13px; cursor: pointer; flex: 1; }
  .picker-add{
    display: flex; align-items: center; gap: 6px; margin-top: 8px;
    padding-top: 8px; border-top: 1px solid var(--line);
  }
  .picker-add input{ flex: 1; border: 1px solid #cbd5e1; border-radius: 7px; padding: 5px 8px; font-size: 12px; outline:none; }
  .picker-add input:focus{ border-color: var(--brand); }
  .picker-add button{
    padding: 5px 12px; border: none; border-radius: 7px; background: var(--brand); color: #fff;
    font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap;
  }

  /* ============ Actions ============ */
  .actions{ margin-top: 18px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  /* ============ 时段切换 Tabs ============ */
  .period-tabs{ display: flex; gap: 10px; margin: 12px 0 2px; flex-wrap: wrap; }
  .period-tab{ display: flex; flex-direction: column; align-items: flex-start; gap: 2px;
    padding: 9px 18px; border: 1.5px solid #e2e8f0; background: #fff; border-radius: 12px;
    cursor: pointer; transition: all .15s; font-size: 15px; font-weight: 600; color: #334155; }
  .period-tab .pr{ font-size: 11px; color: #94a3b8; font-weight: 400; }
  .period-tab:hover{ border-color: #93c5fd; }
  .period-tab.active{ border-color: #2563eb; background: linear-gradient(135deg,#2563eb,#1d4ed8); color: #fff;
    box-shadow: 0 8px 18px -8px rgba(37,99,235,.6); }
  .period-tab.active .pr{ color: #dbeafe; }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 12px 26px; border: none; border-radius: 10px;
    font-size: 15px; cursor: pointer; transition: all 0.2s; font-weight: 600;
  }
  .btn-primary{ background: linear-gradient(135deg, var(--brand-deep), var(--brand)); color: #fff;
                box-shadow: 0 10px 22px -8px rgba(37,99,235,0.6); }
  .btn-primary:hover{ transform: translateY(-2px); box-shadow: 0 14px 28px -8px rgba(37,99,235,.7); }
  .btn-sm{ background: #fff; color: var(--brand); border: 1px solid var(--brand); cursor: pointer;
          font-size: 14px; font-weight: 600; padding: 10px 20px; border-radius: 10px; transition: background .15s; }
  .btn-sm:hover{ background: var(--brand-light); }
  .btn-sm.draft{ color: var(--success-dark); border-color: #a7f3d0; }
  .btn-sm.draft:hover{ background: #ecfdf5; }
  .btn-sm.danger{ color: #dc2626; border-color: #fecaca; }
  .btn-sm.danger:hover{ background: #fef2f2; border-color: #dc2626; }
  .info-hint{ font-size: 13px; color: var(--muted-2); }
  .draft-note{ font-size: 13px; color: var(--muted); margin-right: 10px; }

  /* 轻提示 toast */
  .toast{
    position: fixed; left: 50%; bottom: 32px; transform: translateX(-50%) translateY(20px);
    background: var(--ink); color: #fff; padding: 12px 22px; border-radius: 12px;
    font-size: 14px; font-weight: 600; box-shadow: var(--shadow-lg); z-index: 999;
    opacity: 0; transition: opacity .3s, transform .3s; pointer-events: none; max-width: 90vw;
  }
  .toast.show{ opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ============ Stats Bar ============ */
  .stats-bar{ display: flex; gap: 14px; margin-top: 14px; flex-wrap: wrap; }
  .stat-pill{ display:inline-flex; align-items:center; gap:6px; padding:6px 14px; border-radius:999px;
              font-size:13px; font-weight:600; background:var(--brand-light); color:var(--brand-dark); border:1px solid var(--brand-soft); }

  footer{ text-align:center; color:var(--muted-2); font-size:13px; padding:8px 20px 40px; }

  /* ============ 回到导航页按钮 ============ */
  .back-home{
    display:inline-flex; align-items:center; gap:6px;
    margin:16px 24px 0; padding:8px 15px;
    background:#fff; border:1px solid #e2e8f0; border-radius:10px;
    color:#2563eb; font-size:14px; font-weight:600;
    text-decoration:none; cursor:pointer;
    box-shadow:0 1px 2px rgba(15,23,42,.06);
    transition:transform .15s, box-shadow .15s, background .15s;
  }
  .back-home:hover{ transform:translateY(-1px); background:#eff6ff; box-shadow:0 6px 16px -6px rgba(37,99,235,.4); }
  .back-home .ic{ font-size:15px; line-height:1; }
</style>
</head>
<body>
  <a class="back-home" href="../"><span class="ic">←</span> 回到导航页</a>
  <header class="header">
    <div class="header-main">
      <span class="eyebrow">✈ 排班表工具</span>
      <h1>航班排班表</h1>
      <p>上传当日航班 Excel，自动提取出港航班信息，生成可编辑的排班表——分配登机口、指定负责人、查看备注与特服</p>
    </div>
    <div class="plane">✈️</div>
  </header>

  <div class="container anim" id="mainArea">
    <!-- 上传区 -->
    <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
      <div class="icon">📅</div>
      <div class="text">点击或拖拽上传航班 Excel 文件</div>
      <div class="hint">支持 .xls / .xlsx 格式 · 仅读取出港航班数据 · 数据在浏览器本地处理</div>
      <input type="file" id="fileInput" accept=".xls,.xlsx" onchange="handleFile(this.files[0])">
    </div>

    <!-- 草稿恢复入口（仅当存在草稿时显示） -->
    <div id="draftBar" style="display:none; text-align:center; margin-bottom:28px;">
      <span class="draft-note" id="draftNote"></span>
      <button class="btn-sm draft" onclick="loadDraft()">📂 读取上次草稿</button>
    </div>

    <!-- 结果区 -->
    <div id="resultArea" style="display:none;">
      <div class="panel">
        <h2>📋 出港航班排班表</h2>
        <div class="stats-bar" id="statsBar"></div>
        <div class="period-tabs" id="periodTabs"></div>
        <div class="table-wrap" style="margin-top:14px;">
          <table class="sch-table" id="schTable">
            <thead><tr>
              <th style="width:110px;">出港航班</th><th style="width:90px;">到站</th><th style="width:65px;">计离</th>
              <th style="width:95px;">出港订座</th><th style="width:65px;">登机口</th><th style="width:160px;">负责</th>
              <th>备注</th><th style="width:130px;">操作</th>
            </tr></thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>
      <div class="actions">
        <button class="btn btn-primary" onclick="exportExcel()">⬇ 下载 Excel</button>
        <button class="btn btn-primary" style="background:linear-gradient(135deg,#0f172a,#334155);box-shadow:0 10px 22px -8px rgba(15,23,42,.55);" onclick="exportImage()">🖼 导出图片</button>
        <button class="btn-sm" onclick="exportExcelAll()">⬇ 导出全部(Excel)</button>
        <button class="btn-sm" onclick="appendRow()">＋ 末尾新增一行</button>
        <button class="btn-sm draft" onclick="saveDraft()">💾 存草稿</button>
        <button class="btn-sm" onclick="loadDraft()">📂 读取草稿</button>
        <button class="btn-sm danger" onclick="clearAll()">🗑 一键清空</button>
        <span class="info-hint">每行可「插入 / 删除」；插入的空行可直接编辑航班、到站、计离、订座与备注，导出时一并保留。</span>
      </div>
    </div>

    <footer>航班工作工具集 · 由 WorkBuddy 部署至 GitHub Pages</footer>
  </div>

<script>
// ========== 预设负责人 & 颜色映射 ==========
var PRESET_NAMES = ['张星宇','张永标','高愉铠','姜欢殊','黄蓓蓓'];
var NAME_COLORS = {
  '张星宇':'tag-green', '张永标':'tag-sky', '高愉铠':'tag-blue',
  '姜欢殊':'tag-pink', '黄蓓蓓':'tag-purple'
};
// 额外自定义名字循环用色
var EXTRA_COLORS = ['tag-amber','tag-green','tag-pink','tag-sky','tag-blue'];
var customNames = []; // 用户添加的自定义名字列表

// 负责人标签颜色（class → 实际十六进制），用于导出图片时还原配色
var PERSON_HEX = {
  'tag-green':  {bg:'#d1fae5', fg:'#047857'},
  'tag-sky':    {bg:'#e0f2fe', fg:'#0369a1'},
  'tag-blue':   {bg:'#dbeafe', fg:'#1d4ed8'},
  'tag-pink':   {bg:'#fce7f3', fg:'#be185d'},
  'tag-purple': {bg:'#ede9fe', fg:'#6d28d9'},
  'tag-amber':  {bg:'#fef3c7', fg:'#b45309'}
};
function getHex(name){ var cl = getColor(name); return PERSON_HEX[cl] || PERSON_HEX['tag-amber']; }

function getColor(name){
  if(NAME_COLORS[name]) return NAME_COLORS[name];
  var idx = customNames.indexOf(name);
  return idx >= 0 ? EXTRA_COLORS[idx % EXTRA_COLORS.length] : 'tag-amber';
}

// ========== 拖拽上传 ==========
var uz = document.getElementById('uploadZone');
uz.addEventListener('dragover', function(e){ e.preventDefault(); e.stopPropagation(); uz.classList.add('dragover'); });
uz.addEventListener('dragleave', function(e){ e.preventDefault(); e.stopPropagation(); uz.classList.remove('dragover'); });
uz.addEventListener('drop', function(e){
  e.preventDefault(); e.stopPropagation(); uz.classList.remove('dragover');
  if(e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});

// ========== 全局数据 ==========
var flightData = []; // [{flight, dest, depTime, booking, tesfu, yutui, note, gate, persons, period}]
var currentPeriod = 'morning'; // 当前查看的时段：morning/afternoon/evening
var PERIODS = [
  {key:'morning',   label:'早上', range:'0830–1400'},
  {key:'afternoon', label:'下午', range:'1400–1830'},
  {key:'evening',   label:'晚上', range:'1830 以后'}
];
var PERIOD_LABEL = { morning:'早上', afternoon:'下午', evening:'晚上' };

// 将计离时间字符串解析为分钟数（如 "0830"→510, "14:00"→840）；无法解析返回 null
function depTimeToMin(s){
  if(s===undefined||s===null||s==='') return null;
  var str = String(s).replace(/[^\d:]/g,'');
  var m = str.match(/(\d{1,2}):?(\d{2})/);
  if(!m) return null;
  var h = parseInt(m[1],10), mm = parseInt(m[2],10);
  if(h>24||mm>59) return null;
  return h*60+mm;
}

// 自动选择第一个有数据的时段作为当前页
function autoSelectPeriod(){
  for(var pi=0; pi<PERIODS.length; pi++){
    if(flightData.some(function(d){ return d.period===PERIODS[pi].key; })){ currentPeriod = PERIODS[pi].key; return; }
  }
  currentPeriod = 'morning';
}

// 页面加载时：若本地存有草稿，在上传区下方显示"读取草稿"入口
function refreshDraftBar(){
  var bar = document.getElementById('draftBar');
  var note = document.getElementById('draftNote');
  try{
    var raw = localStorage.getItem(DRAFT_KEY);
    if(raw){
      var p = JSON.parse(raw);
      var cnt = (p && Array.isArray(p.data)) ? p.data.length : 0;
      var when = '';
      if(p && p.ts){ var t=new Date(p.ts); when='（'+ (t.getMonth()+1) +'月'+ t.getDate() +'日 '+ String(t.getHours()).padStart(2,'0')+':'+String(t.getMinutes()).padStart(2,'0') +'，'+cnt+' 行）'; }
      note.textContent = '检测到上次保存的草稿'+when;
      bar.style.display = 'block';
      return;
    }
  }catch(e){}
  bar.style.display = 'none';
}

function handleFile(file){
  var reader = new FileReader();
  reader.onload = function(e){
    try{
      var wb = XLSX.read(e.target.result, {type:'array'});
      var ws = wb.Sheets[wb.SheetNames[0]];
      var raw = XLSX.utils.sheet_to_json(ws, {header:1});
      if(!raw || raw.length < 2){ alert('文件内容为空或格式不正确'); return; }
      parseAndRender(raw);
    }catch(err){
      alert('解析 Excel 失败：' + err.message);
      console.error(err);
    }
  };
  reader.readAsArrayBuffer(file);
}

// ========== 解析 Excel ==========
function parseAndRender(raw){
  var headers = raw[0];
  // 找列索引
  function colIdx(name){
    for(var i=0;i<headers.length;i++) if(String(headers[i]).trim()===name) return i;
    return -1;
  }
  var cFlight = colIdx('出港航班'), cDest = colIdx('到站'), cDep = colIdx('计离');
  var cBooking = colIdx('出港订座'), cTesfu = colIdx('特服'), cYutui = colIdx('预推'), cNote = colIdx('备注');

  if(cFlight<0 || cDest<0 || cDep<0){
    alert('无法识别必要的列名（需要「出港航班」「到站」「计离」）。请确认 Excel 格式正确。'); return;
  }

  flightData = [];
  for(var r=1;r<raw.length;r++){
    var row = raw[r];
    var flight = String(row[cFlight]||'').trim().replace(/[#&]/g, '').trim();
    if(!flight) continue; // 空行跳过

    var bookingStr = String(row[cBooking]||'').trim();
    // 解析订座：格式如 "    0|    8|151"
    var bookingDisplay = bookingStr;

    // 特服：取 | 后的部分（出港特服）
    var tesfuFull = String(row[cTesfu]||'').trim();
    var tesfuDep = '';
    if(tesfuFull && tesfuFull.indexOf('|')>=0){
      var parts = tesfuFull.split('|');
      tesfuDep = parts.length > 1 ? parts[parts.length-1].trim() : '';
    }

    // 备注：按序组合 预推时间 → 特服 → 航班调时
    var yutuiVal = String(row[cYutui]||'').trim();
    var noteVal = String(row[cNote]||'').trim();

    // 构建备注文本
    var notesArr = [];
    // 1. 预推列不为空（有预推时间）→ 写"预推时间 XXX"
    if(yutuiVal) notesArr.push('预推时间 '+yutuiVal);
    // 2. 特服列 | 后为出港特服 → 写"特服:XXX"
    if(tesfuDep) notesArr.push('特服:'+tesfuDep);
    // 3. 备注列含"调时"文字 → 写"航班调时"
    if(noteVal && noteVal.indexOf('调时')>=0) notesArr.push('航班调时');

    // 计离时间分段 & 过滤（0830 前为上一组，删除）
    var depMin = depTimeToMin(row[cDep]);
    if(depMin !== null && depMin < 510) continue; // 删除 0830 前的航班
    var period;
    if(depMin === null) period = 'evening';
    else if(depMin < 840) period = 'morning';
    else if(depMin < 1110) period = 'afternoon';
    else period = 'evening';

    flightData.push({
      flight: flight,
      dest: String(row[cDest]||'').trim(),
      depTime: String(row[cDep]||'').trim(),
      booking: bookingDisplay,
      bookingRaw: bookingStr,
      tesfu: tesfuDep,
      yutui: yutuiVal,
      note: notesArr.join('；'),
      gate: '2',
      persons: [],
      period: period
    });
  }

  autoSelectPeriod();
  renderTable(flightData);
}

// ========== 渲染表格 ==========
function renderTable(data){
  flightData = data; // 确保后续按索引查找（负责人/登机口等）使用同一数据集
  document.getElementById('uploadZone').style.display='none';
  document.getElementById('resultArea').style.display='block';

  // 统计栏（当前页 + 各时段计数）
  var counts = {morning:0, afternoon:0, evening:0};
  data.forEach(function(d){ counts[d.period] = (counts[d.period]||0)+1; });
  var curCnt = data.filter(function(d){ return d.period===currentPeriod; }).length;
  document.getElementById('statsBar').innerHTML =
    '<span class="stat-pill">📑 当前：'+PERIOD_LABEL[currentPeriod]+'（'+curCnt+' 班）</span>' +
    '<span class="stat-pill">🌅 早 '+counts.morning+'</span>' +
    '<span class="stat-pill">☀️ 午 '+counts.afternoon+'</span>' +
    '<span class="stat-pill">🌙 晚 '+counts.evening+'</span>';

  var html = '';
  data.forEach(function(item, idx){
    if(item.period !== currentPeriod) return; // 仅显示当前时段
    html += '<tr>';
    // 出港航班（插入/新增行可编辑）
    if(item.editable)
      html += '<td class="flight-num"><input class="cell-input" type="text" value="'+esc(item.flight)+'" oninput="updateField('+idx+',\'flight\',this.value)"></td>';
    else
      html += '<td class="flight-num">'+esc(item.flight)+'</td>';
    // 到站
    if(item.editable)
      html += '<td><input class="cell-input" type="text" value="'+esc(item.dest)+'" oninput="updateField('+idx+',\'dest\',this.value)"></td>';
    else
      html += '<td>'+esc(item.dest)+'</td>';
    // 计离
    if(item.editable)
      html += '<td><input class="cell-input" type="text" value="'+esc(item.depTime)+'" oninput="updateField('+idx+',\'depTime\',this.value)"></td>';
    else
      html += '<td>'+esc(item.depTime)+'</td>';
    // 出港订座
    if(item.editable)
      html += '<td><input class="cell-input" type="text" value="'+esc(item.booking)+'" oninput="updateField('+idx+',\'booking\',this.value)"></td>';
    else
      html += '<td>'+esc(item.booking)+'</td>';
    // 登机口输入
    html += '<td><input class="gate-input" type="text" placeholder="2XX" value="'+esc(item.gate || '2')+'" data-idx="'+idx+'" oninput="updateGate('+idx+',this.value)"></td>';
    // 负责人
    html += '<td><div class="resp-cell" id="rc_'+idx+'">'+renderPersons(idx,item.persons)+renderPicker(idx)+'</div></td>';
    // 备注（插入/新增行可编辑）
    if(item.editable)
      html += '<td class="note-cell"><input class="cell-input note-input" type="text" value="'+esc(item.note)+'" oninput="updateField('+idx+',\'note\',this.value)"></td>';
    else
      html += '<td class="note-cell">'+esc(item.note)+'</td>';
    // 操作列：插入 / 删除
    html += '<td class="op-cell">'+
              '<button class="row-btn" title="在当前行上方插入一个空行" onclick="insertRow('+idx+')">＋插入</button>'+
              '<button class="row-btn danger" title="删除此行" onclick="deleteRow('+idx+')">🗑删除</button>'+
            '</td>';
    html += '</tr>';
  });

  document.getElementById('tbody').innerHTML = html;
  updatePeriodTabs();
}

// ========== 时段切换 ==========
function updatePeriodTabs(){
  var box = document.getElementById('periodTabs');
  if(!box) return;
  var html = '';
  PERIODS.forEach(function(p){
    var active = (p.key===currentPeriod) ? ' active' : '';
    html += '<button class="period-tab'+active+'" onclick="switchPeriod(\''+p.key+'\')">'+p.label+'<span class="pr">'+p.range+'</span></button>';
  });
  box.innerHTML = html;
}
function switchPeriod(p){
  currentPeriod = p;
  renderTable(flightData);
}

function esc(s){ var d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// ========== 登机口更新 ==========
function updateGate(idx, val){ flightData[idx].gate = val; }

// ========== 删除行 / 插入行 / 末尾新增 ==========
function deleteRow(idx){
  flightData.splice(idx, 1);
  renderTable(flightData);
}

function insertRow(idx){
  // 在当前行上方插入一个空行（可编辑），沿用当前行所在时段
  var p = (flightData[idx] && flightData[idx].period) ? flightData[idx].period : currentPeriod;
  flightData.splice(idx, 0, blankRow(p));
  renderTable(flightData);
}

function appendRow(){
  // 在末尾新增一个空行（可编辑），归入当前时段
  flightData.push(blankRow(currentPeriod));
  renderTable(flightData);
}

function blankRow(period){
  return { flight:'', dest:'', depTime:'', booking:'', bookingRaw:'',
           tesfu:'', yutui:'', note:'', gate:'2', persons:[], editable:true,
           period: period || 'evening' };
}

function updateField(idx, field, val){
  flightData[idx][field] = val;
}

// ========== 存草稿 / 读取草稿 / 一键清空 ==========
var DRAFT_KEY = 'flight_schedule_draft_v1';

function saveDraft(){
  if(!flightData.length){ flashHint('⚠️ 暂无可保存的数据'); return; }
  try{
    var payload = { ts: Date.now(), data: flightData };
    localStorage.setItem(DRAFT_KEY, JSON.stringify(payload));
    var t = new Date(payload.ts);
    var hh = String(t.getHours()).padStart(2,'0');
    var mm = String(t.getMinutes()).padStart(2,'0');
    flashHint('✅ 草稿已保存（'+hh+':'+mm+'，共 '+flightData.length+' 行）');
    refreshDraftBar();
  }catch(e){ alert('保存草稿失败：'+e.message); }
}

function loadDraft(){
  try{
    var raw = localStorage.getItem(DRAFT_KEY);
    if(!raw){ flashHint('📭 暂无可恢复的草稿'); return; }
    var payload = JSON.parse(raw);
    if(!payload || !Array.isArray(payload.data)){ flashHint('⚠️ 草稿格式无效'); return; }
    flightData = payload.data.map(function(it){
      return {
        flight: it.flight||'', dest: it.dest||'', depTime: it.depTime||'',
        booking: it.booking||'', bookingRaw: it.bookingRaw||it.booking||'',
        tesfu: it.tesfu||'', yutui: it.yutui||'', note: it.note||'',
        gate: it.gate||'', persons: Array.isArray(it.persons)?it.persons:[],
        editable: it.editable!==undefined ? it.editable : true,
        period: it.period || 'evening'
      };
    });
    autoSelectPeriod();
    renderTable(flightData);
    flashHint('📂 已读取草稿（共 '+flightData.length+' 行）');
  }catch(e){ alert('读取草稿失败：'+e.message); }
}

function clearAll(){
  if(!confirm('确定清空整个排班表吗？此操作不可撤销（已保存的草稿不受影响）。')) return;
  flightData = [];
  currentPeriod = 'morning';
  document.getElementById('resultArea').style.display = 'none';
  document.getElementById('uploadZone').style.display = 'block';
  refreshDraftBar(); // 清空后若仍有草稿，重新显示"读取草稿"入口
  flashHint('🗑 已清空排班表');
}

// 轻提示
function flashHint(msg){
  var t = document.getElementById('toast');
  if(!t){ t = document.createElement('div'); t.id = 'toast'; t.className = 'toast'; document.body.appendChild(t); }
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(function(){ t.classList.remove('show'); }, 2600);
}

// ========== 负责人渲染 ==========
function renderPersons(idx, persons){
  var html = '';
  persons.forEach(function(n,i){
    html += '<span class="resp-tag '+getColor(n)+'">'+esc(n)+'<span class="rm-btn" title="移除" onclick="removePerson('+idx+','+i+')">&times;</span></span>';
  });
  return html;
}

function removePerson(idx, pi){
  flightData[idx].persons.splice(pi, 1);
  refreshPersonCell(idx);
}

function addPerson(idx, name){
  name = name.trim();
  if(!name) return;
  // 如果不在预设列表中且不在自定义列表中，加入自定义列表
  if(PRESET_NAMES.indexOf(name)<0 && customNames.indexOf(name)<0){
    customNames.push(name);
  }
  if(flightData[idx].persons.indexOf(name)<0){
    flightData[idx].persons.push(name);
    refreshPersonCell(idx);
  }
}

function refreshPersonCell(idx){
  var cell = document.getElementById('rc_'+idx);
  cell.innerHTML = renderPersons(idx, flightData[idx].persons) + renderPicker(idx);
}

// ========== 下拉选择器 ==========
// 负责人已有人时，隐藏完整添加框，仅保留一个「＋」用于再展开
function renderPicker(idx){
  var hasPersons = flightData[idx].persons.length > 0;
  if(hasPersons){
    return '<div class="picker-wrap"><span class="picker-trigger mini" title="添加 / 修改负责人" onclick="togglePickerMenu(event,'+idx+')">＋</span>' +
           '<div class="picker-menu" id="pm_'+idx+'">'+pickerInner(idx)+'</div></div>';
  }
  return '<div class="picker-wrap"><span class="picker-trigger" onclick="togglePickerMenu(event,'+idx+')">+ 添加 / 修改 ▾</span>' +
         '<div class="picker-menu" id="pm_'+idx+'">'+pickerInner(idx)+'</div></div>';
}
function pickerInner(idx){
  var allNames = PRESET_NAMES.concat(customNames);
  var checks = '';
  allNames.forEach(function(n){
    var checked = flightData[idx].persons.indexOf(n)>=0 ? ' checked' : '';
    checks += '<div class="picker-row"><input type="checkbox" id="ck_'+idx+'_'+safeId(n)+'"'+checked+
             ' onchange="togglePerson(\''+idx+'\',\''+escAttr(n)+'\',this.checked)"><label for="ck_'+idx+'_'+safeId(n)+'">'+
             esc(n)+'</label></div>';
  });
  checks += '<div class="picker-add"><input type="text" placeholder="自定义姓名..." id="customIn_'+idx+'" onkeydown="if(event.key===\'Enter\'){addPerson('+idx+',this.value);this.value=\'\';closePicker('+idx+');return false;}">' +
            '<button onclick="var v=document.getElementById(\'customIn_\'+idx).value;if(v){addPerson('+idx+',v);this.previousSibling.value=\';\'}">添加</button></div>';
  return checks;
}
function safeId(s){ return s.replace(/[^a-zA-Z0-9\u4e00-\u9fa5]/g,'_'); }
function escAttr(s){ return s.replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

function togglePickerMenu(evt, idx){
  evt.stopPropagation();
  var menu = document.getElementById('pm_'+idx);
  var isOpen = menu.classList.contains('open');
  closeAllPickers(); // 先关其他
  if(!isOpen) menu.classList.add('open');
}

function togglePerson(idx, name, checked){
  if(checked) addPerson(idx,name);
  else{
    var i = flightData[idx].persons.indexOf(name);
    if(i>=0) flightData[idx].persons.splice(i,1);
    refreshPersonCell(idx);
  }
}

function closeAllPickers(){
  var menus = document.querySelectorAll('.picker-menu.open');
  for(var i=0;i<menus.length;i++) menus[i].classList.remove('open');
}
document.addEventListener('click', closeAllPickers);

// ========== 导出 Excel ==========
// 根据航班数组构建带样式的工作表
function buildSheet(rows){
  var headers = ['出港航班','到站','计离','出港订座','登机口','负责','备注'];
  var aoa = [headers];
  rows.forEach(function(item){
    aoa.push([
      item.flight, item.dest, item.depTime, item.booking,
      (item.gate || '2'), item.persons.join('、'), item.note
    ]);
  });
  var ws = XLSX.utils.aoa_to_sheet(aoa);
  ws['!cols'] = [
    {wch:14},{wch:10},{wch:8},{wch:16},{wch:8},{wch:18},{wch:40}
  ];
  // 设置标题行样式（蓝底白字）
  var range = XLSX.utils.decode_range(ws['!ref']);
  for(var c=range.s.c; c<=range.e.c; c++){
    var addr = XLSX.utils.encode_cell({r:0,c:c});
    ws[addr]={v:headers[c],t:'s',s:{font:{bold:true,color:{rgb:"FFFFFF"},sz:12},
           fill:{fgColor:{rgb:"1E3A8A"}},alignment:{horizontal:"center"}}};
  }
  return ws;
}

// 导出当前页（按当前选中的时段）
function exportExcel(){
  if(!flightData.length){ alert('没有数据可导出'); return; }
  var rows = flightData.filter(function(d){ return d.period===currentPeriod; });
  if(!rows.length){ alert('当前页（'+PERIOD_LABEL[currentPeriod]+'）没有数据'); return; }
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, buildSheet(rows), PERIOD_LABEL[currentPeriod]+'排班');
  XLSX.writeFile(wb, '航班排班表_'+PERIOD_LABEL[currentPeriod]+'.xlsx');
}

// 导出全部（三个时段各一个 sheet：早上 / 下午 / 晚上）
function exportExcelAll(){
  if(!flightData.length){ alert('没有数据可导出'); return; }
  var wb = XLSX.utils.book_new();
  PERIODS.forEach(function(p){
    var rows = flightData.filter(function(d){ return d.period===p.key; });
    if(!rows.length) return; // 跳过空时段
    XLSX.utils.book_append_sheet(wb, buildSheet(rows), p.label+'排班');
  });
  XLSX.writeFile(wb, '航班排班表_全部.xlsx');
}

// ========== 导出图片（Canvas 绘制带样式 PNG）============
function exportImage(){
  var data = flightData.filter(function(d){ return d.period===currentPeriod; });
  if(!data.length){ alert('当前页（'+PERIOD_LABEL[currentPeriod]+'）没有数据'); return; }
  var scale = 2; // 2倍分辨率，导出更清晰
  var F = '"PingFang SC","Microsoft YaHei","Hiragino Sans GB",sans-serif';
  // 列定义：标题 / 字段键 / 列宽(px)
  var cols = [
    {t:'出港航班', k:'flight',  w:118},
    {t:'到站',     k:'dest',    w:84},
    {t:'计离',     k:'depTime', w:74},
    {t:'出港订座', k:'booking', w:104},
    {t:'登机口',   k:'gate',    w:78},
    {t:'负责',     k:'persons', w:214},
    {t:'备注',     k:'note',    w:286}
  ];
  var margin = 26, titleH = 56, headerH = 48, rowH = 58;
  var tableW = 0; cols.forEach(function(c){ tableW += c.w; });
  var W = tableW + margin*2;
  var H = titleH + headerH + rowH*data.length + margin;
  var cv = document.createElement('canvas');
  cv.width = W*scale; cv.height = H*scale;
  var ctx = cv.getContext('2d');
  ctx.scale(scale, scale);
  ctx.textBaseline = 'middle';

  // 背景
  ctx.fillStyle = '#ffffff'; ctx.fillRect(0,0,W,H);

  // 标题
  ctx.fillStyle = '#0f172a';
  ctx.font = 'bold 21px ' + F; ctx.textAlign = 'left';
  ctx.fillText('航班出港排班表 · '+PERIOD_LABEL[currentPeriod], margin, titleH/2);
  var d = new Date();
  var ds = (d.getMonth()+1)+'月'+d.getDate()+'日';
  ctx.fillStyle = '#94a3b8'; ctx.font = '13px ' + F; ctx.textAlign = 'right';
  ctx.fillText(ds, W-margin, titleH/2);

  // 表头（蓝底白字）
  var hy = titleH;
  ctx.fillStyle = '#1e3a8a';
  ctx.fillRect(margin, hy, tableW, headerH);
  ctx.fillStyle = '#ffffff'; ctx.font = 'bold 14px ' + F; ctx.textAlign = 'center';
  var x = margin;
  cols.forEach(function(c){ ctx.fillText(c.t, x + c.w/2, hy + headerH/2 + 1); x += c.w; });

  // 数据行
  for(var i=0;i<data.length;i++){
    var item = data[i];
    var ry = titleH + headerH + i*rowH;
    // 隔行底色
    ctx.fillStyle = (i%2===0) ? '#ffffff' : '#f5f8ff';
    ctx.fillRect(margin, ry, tableW, rowH);
    // 行下边框
    ctx.strokeStyle = '#e2e8f0'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(margin, ry+rowH); ctx.lineTo(margin+tableW, ry+rowH); ctx.stroke();

    x = margin;
    for(var ci=0; ci<cols.length; ci++){
      var c = cols[ci]; var cx = x;
      if(c.k === 'persons'){
        drawChips(ctx, item.persons, cx, ry, c.w, rowH, F);
      } else {
        var val = String(item[c.k]||'');
        if(c.k === 'flight'){ ctx.fillStyle = '#0f172a'; ctx.font = 'bold 14px ' + F; }
        else { ctx.fillStyle = '#334155'; ctx.font = '13px ' + F; }
        ctx.textAlign = 'center';
        ctx.save();
        ctx.beginPath(); ctx.rect(cx+5, ry+5, c.w-10, rowH-10); ctx.clip();
        ctx.fillText(val, cx + c.w/2, ry + rowH/2 + 1);
        ctx.restore();
      }
      // 列竖线
      ctx.strokeStyle = '#eef2f7'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(cx, ry); ctx.lineTo(cx, ry+rowH); ctx.stroke();
      x += c.w;
    }
    ctx.strokeStyle = '#eef2f7'; ctx.beginPath(); ctx.moveTo(x, ry); ctx.lineTo(x, ry+rowH); ctx.stroke();
  }

  // 外边框（深蓝）
  ctx.strokeStyle = '#1e3a8a'; ctx.lineWidth = 2;
  ctx.strokeRect(margin, titleH, tableW, headerH + rowH*flightData.length);

  // 下载
  var url = cv.toDataURL('image/png');
  var a = document.createElement('a');
  a.href = url; a.download = '航班出港排班表_'+PERIOD_LABEL[currentPeriod]+'.png';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  flashHint('🖼 已导出图片（蓝底白字 + 负责人配色）');
}

function drawChips(ctx, persons, cx, ry, cw, rowH, F){
  if(!persons || !persons.length) return;
  var pad = 10, gap = 6, chipH = 26, top = ry + (rowH - chipH)/2;
  var x = cx + pad, y = top;
  ctx.textBaseline = 'middle';
  for(var i=0;i<persons.length;i++){
    var n = persons[i]; if(!n) continue;
    var col = getHex(n);
    ctx.font = '12px ' + F;
    var tw = ctx.measureText(n).width;
    var chipW = tw + 18;
    if(x + chipW > cx + cw - pad){           // 换行
      x = cx + pad; y = top + chipH + gap;
    }
    if(y + chipH > ry + rowH - 2) break;     // 超出单元格则截断
    roundRect(ctx, x, y, chipW, chipH, 13);
    ctx.fillStyle = col.bg; ctx.fill();
    ctx.fillStyle = col.fg; ctx.textAlign = 'left';
    ctx.fillText(n, x + 9, y + chipH/2 + 1);
    x += chipW + gap;
  }
}

function roundRect(ctx,x,y,w,h,r){
  if(w < 2*r) r = w/2; if(h < 2*r) r = h/2;
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

// ========== 页面初始化：检测是否有草稿可恢复 ==========
refreshDraftBar();
</script>
