<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>航班工作工具集 · 导航</title>
<style>
  :root{ --blue1:#0b1f4d; --blue2:#1e3a8a; --blue3:#2563eb; --muted:#64748b; --line:#e5e7eb; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
        background:#f1f5f9; color:#0f172a; min-height:100vh; }
  .hero{ background:linear-gradient(135deg,var(--blue1),var(--blue2) 60%,var(--blue3));
         color:#fff; padding:56px 24px 64px; text-align:center; position:relative; overflow:hidden; }
  .hero::after{ content:""; position:absolute; right:-60px; top:-60px; width:220px; height:220px;
                background:radial-gradient(circle, rgba(255,255,255,.18), transparent 70%); border-radius:50%; }
  .hero h1{ font-size:30px; font-weight:800; letter-spacing:.5px; }
  .hero p{ margin-top:10px; color:#c7d2fe; font-size:15px; }
  .grid{ max-width:960px; margin:-36px auto 48px; padding:0 20px;
         display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:20px; }
  .card{ background:#fff; border-radius:16px; padding:26px; text-decoration:none; color:inherit;
         box-shadow:0 10px 30px rgba(15,23,42,.08); border:1px solid var(--line);
         transition:transform .2s, box-shadow .2s; }
  .card:hover{ transform:translateY(-4px); box-shadow:0 18px 40px rgba(15,23,42,.14); }
  .card .ico{ font-size:30px; }
  .card h2{ margin:12px 0 8px; font-size:19px; }
  .card p{ color:var(--muted); font-size:14px; line-height:1.6; }
  .card .go{ margin-top:14px; color:var(--blue3); font-weight:600; font-size:14px; }
  footer{ text-align:center; color:#94a3b8; font-size:13px; padding:0 20px 40px; }
</style>
</head>
<body>
  <header class="hero">
    <h1>✈️ 航班工作工具集</h1>
    <p>三个纯前端工具 · 数据只在你浏览器本地处理，不上传任何服务器</p>
  </header>
  <main class="grid">
    <a class="card" href="./manifest/">
      <div class="ico">📋</div>
      <h2>国际名单转化</h2>
      <p>上传航班名单 Excel，按海关模板清洗、转换、导出可上传文件。</p>
      <div class="go">打开工具 →</div>
    </a>
    <a class="card" href="./upgrade/">
      <div class="ico">💰</div>
      <h2>升舱金额计算器</h2>
      <p>按岗位比例分配升舱金额，生成「人员 × 日期」交叉汇总表。</p>
      <div class="go">打开工具 →</div>
    </a>
    <a class="card" href="./stats/">
      <div class="ico">📊</div>
      <h2>航班数据统计</h2>
      <p>上传航班 Excel，自动分类东上航司 / 中联航并生成统计表。</p>
      <div class="go">打开工具 →</div>
    </a>
  </main>
  <footer>由 WorkBuddy 部署至 GitHub Pages · 免费 · 永久在线</footer>
</body>
</html>
